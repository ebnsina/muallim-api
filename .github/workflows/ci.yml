name: CI

on:
  push:
    branches: [main]
  pull_request:

# A second push to the same branch cancels the first: nobody reads the result of
# a run whose commit has already been replaced.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # A real S3 API. The upload tests are skipped without one, and a skipped
      # test that guards a request signature is a test nobody is running.
      #
      # Port 9002 because that is where docker-compose puts it, so the Makefile
      # needs no second address for CI.
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: lms
          MINIO_ROOT_PASSWORD: lms-secret-key
          MINIO_DEFAULT_BUCKETS: lms-uploads
        ports: ['9002:9000']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The application role must not be a superuser. A superuser bypasses row
      # level security, so every tenant-isolation test would pass against a
      # database that enforces nothing — the most expensive kind of green build.
      # The service container's own `postgres` role owns nothing here.
      - name: Create the lms role and databases
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE ROLE lms LOGIN PASSWORD 'lms' NOSUPERUSER NOBYPASSRLS"
          psql -h localhost -U postgres -c "CREATE DATABASE lms OWNER lms"
          psql -h localhost -U postgres -c "CREATE DATABASE lms_test OWNER lms"

      - name: Assert the lms role cannot bypass row level security
        env:
          PGPASSWORD: lms
        run: |
          privileged=$(psql -h localhost -U lms -d lms -tAc \
            "SELECT rolsuper OR rolbypassrls FROM pg_roles WHERE rolname = 'lms'")
          if [ "$privileged" != "f" ]; then
            echo "::error::the lms role can bypass RLS; tenant isolation would be untested"
            exit 1
          fi

      - run: make migrate

      # The service container reports healthy before MinIO has finished creating
      # the bucket, and a test that uploads into a bucket that is not there yet
      # fails for a reason that has nothing to do with the change under review.
      - name: Wait for MinIO
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9002/minio/health/live; then exit 0; fi
            sleep 1
          done
          echo "::error::MinIO never came up"
          exit 1

      # vet, gofmt, and the race suite against a real Postgres. Mocking the
      # database would test the mock: neither RLS nor a query plan has an opinion
      # about a fake.
      - run: make check

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          "$(go env GOPATH)/bin/staticcheck" ./...

      # The OpenAPI document is the contract with muallim-web and every other client.
      # A build that cannot emit it has broken that contract in a way no test sees.
      - run: make spec

      - run: go build ./...
